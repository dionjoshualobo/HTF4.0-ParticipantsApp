server {
  listen       80;
  listen  [::]:80;
  server_name  _;

  root   /usr/share/nginx/html;
  index  index.html;

  # ── Compression ──────────────────────────────────────────────────────────────
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types
    text/plain text/css text/javascript
    application/javascript application/json application/xml
    image/svg+xml font/woff font/woff2;

  # ── Long cache for hashed asset files ────────────────────────────────────────
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Service worker / manifest should NOT be cached long-term
  location = /sw.js          { add_header Cache-Control "no-cache"; }
  location = /manifest.json  { add_header Cache-Control "no-cache"; }
  location = /manifest.webmanifest { add_header Cache-Control "no-cache"; }

  # ── SPA fallback — React Router handles client-side routing ─────────────────
  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache";
  }

  # Security headers
  add_header X-Frame-Options           "SAMEORIGIN"                always;
  add_header X-Content-Type-Options    "nosniff"                   always;
  add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy        "geolocation=(self), camera=(self), microphone=()" always;

  # 50MB upload allowance (not actually used — uploads hit Supabase — but safe default)
  client_max_body_size 50M;
}
